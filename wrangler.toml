#:schema node_modules/wrangler/config-schema.json
name = "internet-health-oracle"
pages_build_output_dir = ".vercel/output"
compatibility_date = "2024-11-18"

# Enable nodejs_compat globally for all builds
compatibility_flags = [ "nodejs_compat" ]

# Explicitly ensure nodejs_compat is set for preview environments
[env.preview]
compatibility_flags = [ "nodejs_compat" ]

# Explicitly ensure nodejs_compat is set for production environments
[env.production]
compatibility_flags = [ "nodejs_compat" ]
